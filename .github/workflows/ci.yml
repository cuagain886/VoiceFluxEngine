name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -count=1 ./...
      - name: benchmarks (zero-alloc gate lands in M3)
        run: go test -run=^$ -bench=. -benchmem ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
