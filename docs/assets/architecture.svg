<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57606a"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cf222e"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#24292f">voicestream — 流式内核架构（时序 / 背压 / 打断）</text>

  <!-- Browser -->
  <rect x="24" y="64" width="150" height="430" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="99" y="90" font-size="13" font-weight="600" fill="#24292f" text-anchor="middle">浏览器</text>
  <rect x="38" y="106" width="122" height="46" rx="5" fill="#ffffff" stroke="#d0d7de"/>
  <text x="99" y="125" font-size="11" fill="#24292f" text-anchor="middle">getUserMedia</text>
  <text x="99" y="140" font-size="10" fill="#57606a" text-anchor="middle">AEC · 16k PCM</text>
  <rect x="38" y="404" width="122" height="46" rx="5" fill="#ffffff" stroke="#d0d7de"/>
  <text x="99" y="423" font-size="11" fill="#24292f" text-anchor="middle">自适应播放缓冲</text>
  <text x="99" y="438" font-size="10" fill="#57606a" text-anchor="middle">PTS 调度 · 抗突发</text>

  <!-- WS pipe -->
  <rect x="196" y="64" width="96" height="430" rx="8" fill="#ddf4ff" stroke="#54aeff"/>
  <text x="244" y="90" font-size="13" font-weight="600" fill="#0969da" text-anchor="middle">WebSocket</text>
  <text x="244" y="110" font-size="10" fill="#0969da" text-anchor="middle">二进制帧协议</text>
  <text x="244" y="126" font-size="10" fill="#57606a" text-anchor="middle">magic·ver·type</text>
  <text x="244" y="140" font-size="10" fill="#57606a" text-anchor="middle">seq·ts_us·len</text>
  <text x="244" y="160" font-size="10" fill="#57606a" text-anchor="middle">音频=裸 PCM</text>
  <text x="244" y="174" font-size="10" fill="#57606a" text-anchor="middle">文本/控制=protobuf</text>
  <text x="244" y="200" font-size="10" fill="#0969da" text-anchor="middle">会话 id · epoch</text>
  <text x="244" y="214" font-size="10" fill="#0969da" text-anchor="middle">断线重连续传</text>
  <text x="244" y="228" font-size="10" fill="#0969da" text-anchor="middle">重放水位去重</text>

  <!-- Kernel -->
  <rect x="314" y="64" width="430" height="430" rx="8" fill="#fff8c5" stroke="#d4a72c" stroke-width="1.5"/>
  <text x="529" y="88" font-size="14" font-weight="700" fill="#7d4e00" text-anchor="middle">内核（本项目）— 模型无关</text>

  <!-- ingress path -->
  <rect x="332" y="106" width="120" height="44" rx="5" fill="#ffffff" stroke="#d4a72c"/>
  <text x="392" y="124" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">内联能量 VAD</text>
  <text x="392" y="139" font-size="10" fill="#57606a" text-anchor="middle">双门限·min-speech</text>

  <rect x="332" y="170" width="120" height="44" rx="5" fill="#dafbe1" stroke="#2da44e"/>
  <text x="392" y="188" font-size="11" font-weight="600" fill="#1a7f37" text-anchor="middle">入口环形缓冲</text>
  <text x="392" y="203" font-size="10" fill="#1a7f37" text-anchor="middle">SPSC·drop-oldest</text>

  <rect x="332" y="234" width="120" height="44" rx="5" fill="#ffffff" stroke="#d4a72c"/>
  <text x="392" y="252" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">ASR Runner</text>
  <text x="392" y="267" font-size="10" fill="#57606a" text-anchor="middle">逐 utterance 流</text>

  <rect x="332" y="298" width="120" height="44" rx="5" fill="#ffffff" stroke="#d4a72c"/>
  <text x="392" y="316" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">编排器</text>
  <text x="392" y="331" font-size="10" fill="#57606a" text-anchor="middle">一次一轮·finals 排队</text>

  <rect x="332" y="362" width="120" height="44" rx="5" fill="#ffffff" stroke="#d4a72c"/>
  <text x="392" y="380" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">LLM → TTS 子链</text>
  <text x="392" y="395" font-size="10" fill="#57606a" text-anchor="middle">token chan（有界）</text>

  <rect x="332" y="426" width="120" height="44" rx="5" fill="#dafbe1" stroke="#2da44e"/>
  <text x="392" y="444" font-size="11" font-weight="600" fill="#1a7f37" text-anchor="middle">出口环形缓冲</text>
  <text x="392" y="459" font-size="10" fill="#1a7f37" text-anchor="middle">SPSC·会话时钟重戳</text>

  <!-- vertical flow arrows -->
  <line x1="392" y1="150" x2="392" y2="168" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="392" y1="214" x2="392" y2="232" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="392" y1="278" x2="392" y2="296" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="392" y1="342" x2="392" y2="360" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="392" y1="406" x2="392" y2="424" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- state machine + barge-in -->
  <rect x="490" y="106" width="236" height="108" rx="5" fill="#ffebe9" stroke="#cf222e"/>
  <text x="608" y="126" font-size="12" font-weight="700" fill="#cf222e" text-anchor="middle">打断状态机（控制面）</text>
  <text x="608" y="146" font-size="10" fill="#24292f" text-anchor="middle">LISTENING → SPEAKING_USER</text>
  <text x="608" y="161" font-size="10" fill="#24292f" text-anchor="middle">→ THINKING → RESPONDING</text>
  <text x="608" y="183" font-size="10" font-weight="600" fill="#cf222e" text-anchor="middle">RESPONDING + speech_start</text>
  <text x="608" y="198" font-size="10" font-weight="600" fill="#cf222e" text-anchor="middle">= 子链取消 + 在途清空（&lt;200ms）</text>
  <line x1="452" y1="128" x2="488" y2="128" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arrRed)" stroke-dasharray="4 3"/>
  <path d="M 530 214 Q 470 260 455 310" stroke="#cf222e" stroke-width="1.5" fill="none" marker-end="url(#arrRed)" stroke-dasharray="4 3"/>
  <text x="520" y="262" font-size="10" fill="#cf222e">BargeIn()</text>

  <!-- backpressure annotation -->
  <rect x="490" y="240" width="236" height="120" rx="5" fill="#ffffff" stroke="#d4a72c" stroke-dasharray="5 3"/>
  <text x="608" y="262" font-size="12" font-weight="700" fill="#7d4e00" text-anchor="middle">双背压（按数据语义）</text>
  <text x="502" y="284" font-size="10" fill="#24292f">音频边缘：环满 → drop-oldest，绝不阻塞</text>
  <text x="502" y="301" font-size="10" fill="#24292f">文本中段：chan 满 → 阻塞回传上游</text>
  <text x="502" y="324" font-size="10" fill="#57606a">慢 TTS → token 满 → LLM 停 → finals 满</text>
  <text x="502" y="341" font-size="10" fill="#57606a">→ ASR 停 → 表现为入口丢帧（有界内存）</text>

  <!-- metrics -->
  <rect x="490" y="384" width="236" height="86" rx="5" fill="#ffffff" stroke="#d4a72c" stroke-dasharray="5 3"/>
  <text x="608" y="406" font-size="12" font-weight="700" fill="#7d4e00" text-anchor="middle">可观测性（背景板）</text>
  <text x="502" y="428" font-size="10" fill="#24292f">/metrics Prometheus · /dash.html 瀑布图</text>
  <text x="502" y="445" font-size="10" fill="#24292f">首响 = 模型固有时延 + 内核开销（分解）</text>
  <text x="502" y="462" font-size="10" fill="#57606a">内核开销 p99 ≈ 5ms（平台区实测）</text>

  <!-- adapters -->
  <rect x="766" y="64" width="190" height="430" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="861" y="90" font-size="13" font-weight="600" fill="#24292f" text-anchor="middle">模型适配器（租户）</text>
  <rect x="782" y="106" width="158" height="56" rx="5" fill="#ffffff" stroke="#d0d7de"/>
  <text x="861" y="128" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">ASR</text>
  <text x="861" y="146" font-size="10" fill="#57606a" text-anchor="middle">mock / 云流式</text>
  <rect x="782" y="178" width="158" height="56" rx="5" fill="#ffffff" stroke="#d0d7de"/>
  <text x="861" y="200" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">LLM</text>
  <text x="861" y="218" font-size="10" fill="#57606a" text-anchor="middle">openai-compat SSE（已接真）</text>
  <rect x="782" y="250" width="158" height="56" rx="5" fill="#ffffff" stroke="#d0d7de"/>
  <text x="861" y="272" font-size="11" font-weight="600" fill="#24292f" text-anchor="middle">TTS</text>
  <text x="861" y="290" font-size="10" fill="#57606a" text-anchor="middle">mock / 可插拔</text>
  <text x="861" y="336" font-size="10" fill="#57606a" text-anchor="middle">统一契约：</text>
  <text x="861" y="352" font-size="10" fill="#57606a" text-anchor="middle">Stream(ctx, in, out)</text>
  <text x="861" y="368" font-size="10" fill="#57606a" text-anchor="middle">阻塞发送 = 背压</text>
  <text x="861" y="384" font-size="10" fill="#57606a" text-anchor="middle">ctx 取消 = 打断永不挂起</text>

  <!-- horizontal arrows browser<->ws<->kernel -->
  <line x1="160" y1="129" x2="194" y2="129" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="292" y1="129" x2="330" y2="129" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="448" x2="292" y2="448" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="194" y1="427" x2="160" y2="427" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- kernel <-> adapters -->
  <line x1="452" y1="256" x2="780" y2="134" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3 3"/>
  <line x1="452" y1="384" x2="780" y2="206" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3 3"/>
  <line x1="780" y1="278" x2="452" y2="440" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3 3"/>

  <text x="24" y="530" font-size="11" fill="#57606a">数据面（实线）：音频两端高频 50fps → 无锁 SPSC 环；文本中段低频 → 有界 channel。控制面（红虚线）：VAD 事件驱动状态机，打断取消不经过拥塞队列。</text>
  <text x="24" y="548" font-size="11" fill="#57606a">模型完全可插拔（注册表装配）；内核可在全 mock 下独立压测 —— 容量曲线与打断时延都只度量内核。</text>
</svg>
