<svg viewBox="0 0 940 460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="940" height="460" fill="#ffffff"/>
  <text x="24" y="30" font-size="16" font-weight="700" fill="#24292f">容量曲线 — 50 → 1500 并发会话（每路真实热路径 + mock 模型）</text>

  <!-- knee marker spanning both panels -->
  <line x1="570" y1="44" x2="570" y2="384" stroke="#d4a72c" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="576" y="58" font-size="11" fill="#9a6700" font-weight="600">拐点 ~500（CPU 墙）</text>

  <!-- ===== Panel A: latency, log scale ===== -->
  <text x="24" y="58" font-size="12" font-weight="600" fill="#57606a">首响 p99（ms，对数轴）</text>
  <line x1="70" y1="200" x2="870" y2="200" stroke="#d0d7de"/>
  <line x1="70" y1="120" x2="870" y2="120" stroke="#eaeef2"/>
  <line x1="70" y1="40"  x2="870" y2="40"  stroke="#eaeef2"/>
  <text x="64" y="204" font-size="10" fill="#57606a" text-anchor="end">100</text>
  <text x="64" y="124" font-size="10" fill="#57606a" text-anchor="end">1000</text>
  <text x="64" y="44"  font-size="10" fill="#57606a" text-anchor="end">10000</text>

  <!-- e2e p99 (client) -->
  <polyline fill="none" stroke="#0969da" stroke-width="2.2"
    points="70,148.7 170,150.6 270,150.5 370,150.4 470,138.4 570,108.9 670,72.4 770,62.8 870,52.3"/>
  <!-- srv p99 -->
  <polyline fill="none" stroke="#8250df" stroke-width="2.2"
    points="70,176.1 170,176.1 270,176.1 370,176.1 470,158.6 570,148.1 670,145.5 770,129.7 870,145.5"/>
  <g fill="#0969da">
    <circle cx="70" cy="148.7" r="3"/><circle cx="170" cy="150.6" r="3"/><circle cx="270" cy="150.5" r="3"/>
    <circle cx="370" cy="150.4" r="3"/><circle cx="470" cy="138.4" r="3"/><circle cx="570" cy="108.9" r="3"/>
    <circle cx="670" cy="72.4" r="3"/><circle cx="770" cy="62.8" r="3"/><circle cx="870" cy="52.3" r="3"/>
  </g>
  <g fill="#8250df">
    <circle cx="70" cy="176.1" r="3"/><circle cx="170" cy="176.1" r="3"/><circle cx="270" cy="176.1" r="3"/>
    <circle cx="370" cy="176.1" r="3"/><circle cx="470" cy="158.6" r="3"/><circle cx="570" cy="148.1" r="3"/>
    <circle cx="670" cy="145.5" r="3"/><circle cx="770" cy="129.7" r="3"/><circle cx="870" cy="145.5" r="3"/>
  </g>
  <text x="880" y="56" font-size="10" fill="#0969da">7.0s</text>
  <text x="880" y="149" font-size="10" fill="#8250df">480ms</text>

  <!-- ===== Panel B: percent ===== -->
  <text x="24" y="246" font-size="12" font-weight="600" fill="#57606a">资源与降级（%）</text>
  <line x1="70" y1="380" x2="870" y2="380" stroke="#d0d7de"/>
  <line x1="70" y1="315" x2="870" y2="315" stroke="#eaeef2"/>
  <line x1="70" y1="250" x2="870" y2="250" stroke="#eaeef2"/>
  <text x="64" y="384" font-size="10" fill="#57606a" text-anchor="end">0</text>
  <text x="64" y="319" font-size="10" fill="#57606a" text-anchor="end">50</text>
  <text x="64" y="254" font-size="10" fill="#57606a" text-anchor="end">100</text>

  <!-- cpu -->
  <polyline fill="none" stroke="#8250df" stroke-width="2.2"
    points="70,372.5 170,379.4 270,379.2 370,377.9 470,325.8 570,283.0 670,276.1 770,276.4 870,278.2"/>
  <!-- drop -->
  <polyline fill="none" stroke="#cf222e" stroke-width="2.2"
    points="70,380 170,380 270,380 370,380 470,380 570,380 670,352.1 770,331.5 870,330.1"/>
  <g fill="#8250df">
    <circle cx="70" cy="372.5" r="3"/><circle cx="170" cy="379.4" r="3"/><circle cx="270" cy="379.2" r="3"/>
    <circle cx="370" cy="377.9" r="3"/><circle cx="470" cy="325.8" r="3"/><circle cx="570" cy="283.0" r="3"/>
    <circle cx="670" cy="276.1" r="3"/><circle cx="770" cy="276.4" r="3"/><circle cx="870" cy="278.2" r="3"/>
  </g>
  <g fill="#cf222e">
    <circle cx="70" cy="380" r="3"/><circle cx="170" cy="380" r="3"/><circle cx="270" cy="380" r="3"/>
    <circle cx="370" cy="380" r="3"/><circle cx="470" cy="380" r="3"/><circle cx="570" cy="380" r="3"/>
    <circle cx="670" cy="352.1" r="3"/><circle cx="770" cy="331.5" r="3"/><circle cx="870" cy="330.1" r="3"/>
  </g>
  <text x="880" y="281" font-size="10" fill="#8250df">78%</text>
  <text x="880" y="333" font-size="10" fill="#cf222e">38%</text>

  <!-- x labels -->
  <g font-size="10.5" fill="#57606a" text-anchor="middle">
    <text x="70" y="400">50</text><text x="170" y="400">100</text><text x="270" y="400">200</text>
    <text x="370" y="400">300</text><text x="470" y="400">400</text><text x="570" y="400">500</text>
    <text x="670" y="400">750</text><text x="770" y="400">1000</text><text x="870" y="400">1500</text>
  </g>
  <text x="470" y="418" font-size="11" fill="#57606a" text-anchor="middle">并发会话数</text>

  <!-- legend -->
  <g font-size="11" fill="#24292f">
    <rect x="600" y="22" width="14" height="3" fill="#0969da"/><text x="619" y="27">客户端 e2e p99</text>
    <rect x="720" y="22" width="14" height="3" fill="#8250df"/><text x="739" y="27">服务端 p99 / CPU</text>
    <rect x="855" y="22" width="14" height="3" fill="#cf222e"/><text x="874" y="27">丢帧率</text>
  </g>

  <text x="24" y="442" font-size="10.5" fill="#57606a">平台区内核开销 p99 = 5ms、内核取消 p99 ≤ 2ms；过墙后入口 drop-oldest 卸载（出口零丢帧），轮速率峰值 202/s 缓降不崩塌。i7-13620H · 安静模式电源 · loadgen 同机（容量下界）。</text>
</svg>
