<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="24" y="32" font-size="17" font-weight="600" fill="#24292f">channels vs 无锁环形缓冲 — ns/op（越短越好）</text>
  <text x="24" y="52" font-size="11" fill="#57606a">i7-13620H · go test -bench -count=6 中位数 · 两者 allocs/op 均为 0</text>

  <!-- legend -->
  <rect x="560" y="22" width="12" height="12" fill="#8b949e"/>
  <text x="577" y="32" font-size="12" fill="#24292f">channel</text>
  <rect x="650" y="22" width="12" height="12" fill="#2ea043"/>
  <text x="667" y="32" font-size="12" fill="#24292f">ring</text>

  <!-- group 1: SPSC int -->
  <text x="24" y="88" font-size="13" font-weight="600" fill="#24292f">SPSC 吞吐（int 元素）</text>
  <rect x="150" y="96" width="69.3" height="16" fill="#8b949e"/>
  <text x="225" y="109" font-size="12" fill="#57606a">70.8</text>
  <rect x="150" y="116" width="32.6" height="16" fill="#2ea043"/>
  <text x="188" y="129" font-size="12" fill="#1a7f37" font-weight="600">33.3（2.1×）</text>

  <!-- group 2: audio frame -->
  <text x="24" y="166" font-size="13" font-weight="600" fill="#24292f">SPSC 音频帧（640B + 缓冲池）</text>
  <rect x="150" y="174" width="149.6" height="16" fill="#8b949e"/>
  <text x="305" y="187" font-size="12" fill="#57606a">152.6</text>
  <rect x="150" y="194" width="70.9" height="16" fill="#2ea043"/>
  <text x="226" y="207" font-size="12" fill="#1a7f37" font-weight="600">72.4（2.1×）</text>

  <!-- group 3: saturated drop-oldest -->
  <text x="24" y="244" font-size="13" font-weight="600" fill="#24292f">饱和 drop-oldest（无消费者）</text>
  <rect x="150" y="252" width="37.6" height="16" fill="#8b949e"/>
  <text x="193" y="265" font-size="12" fill="#57606a">38.4 *</text>
  <rect x="150" y="272" width="34.0" height="16" fill="#2ea043"/>
  <text x="190" y="285" font-size="12" fill="#1a7f37" font-weight="600">34.7（原生原子）</text>

  <!-- group 4: ping-pong -->
  <text x="24" y="322" font-size="13" font-weight="600" fill="#24292f">跨核往返时延（ping-pong RTT）</text>
  <rect x="150" y="330" width="552.2" height="16" fill="#8b949e"/>
  <text x="535" y="343" font-size="12" fill="#ffffff" font-weight="600">563.5</text>
  <rect x="150" y="350" width="147.8" height="16" fill="#2ea043"/>
  <text x="303" y="363" font-size="12" fill="#1a7f37" font-weight="600">150.9（3.7×）</text>

  <!-- footnotes -->
  <text x="24" y="398" font-size="11" fill="#57606a">* channel 的 drop-oldest 为 select 模拟，非原子：与活跃消费者并发时取舍语义不成立 —— 真正的差异是正确性而非速度。</text>
  <text x="24" y="416" font-size="11" fill="#57606a">另：去掉伪共享填充的 ring 为 76.1 ns/op，比 channel 还慢 —— cache line 填充不是装饰（见 M3 设计文档）。</text>
</svg>
