<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>voicestream · 延迟仪表盘</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 28px; background: #0d1117; color: #e6edf3;
      font-family: system-ui, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    h1 { font-size: 1.1rem; color: #7ee0c2; margin: 0 0 2px; }
    .sub { color: #8b949e; font-size: 0.8rem; margin-bottom: 18px; }
    #summary {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 10px 16px; min-width: 130px;
    }
    .card .v { font-size: 1.35rem; font-weight: 600; color: #79c0ff; }
    .card .k { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
    #turns { display: flex; flex-direction: column; gap: 14px; }
    .turn {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px 16px;
    }
    .turn.cancelled { border-color: #f8514966; }
    .turn .meta { font-size: 0.82rem; color: #8b949e; margin-bottom: 8px; display: flex; gap: 14px; flex-wrap: wrap; }
    .turn .meta b { color: #e6edf3; font-weight: 600; }
    .lane { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    .lane .tag { width: 56px; font-size: 0.72rem; color: #8b949e; text-align: right; flex: none; }
    .track { position: relative; flex: 1; height: 14px; background: #0d1117; border-radius: 3px; overflow: hidden; }
    .bar { position: absolute; top: 0; bottom: 0; border-radius: 3px; }
    .bar.asr { background: #1f6feb; }
    .bar.llm { background: #a371f7; }
    .bar.tts { background: #2ea043; }
    .bar.serial { background: #6e7681; }
    .bar.wall { background: #79c0ff33; border: 1px solid #79c0ff66; }
    .marker { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #f0883e; }
    .turn .labels { font-size: 0.74rem; color: #8b949e; margin-top: 6px; }
    .turn .labels span { margin-right: 14px; }
    .save { color: #7ee787; font-weight: 600; }
    .cancelnote { color: #f85149; font-weight: 600; }
    #empty { color: #8b949e; padding: 30px; text-align: center; }
    .legend { font-size: 0.74rem; color: #8b949e; margin-bottom: 14px; }
    .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin: 0 4px 0 12px; vertical-align: -1px; }
  </style>
</head>
<body>
  <h1>voicestream 延迟仪表盘</h1>
  <div class="sub">逐轮瀑布图 —— ASR / LLM / TTS 流水线重叠 vs 朴素串行（灰条）。数据源：<code>/debug/turns</code> SSE</div>
  <div id="summary"></div>
  <div class="legend">
    图例：<i style="background:#1f6feb"></i>ASR 定稿
    <i style="background:#a371f7"></i>LLM token 流
    <i style="background:#2ea043"></i>TTS 合成
    <i style="background:#f0883e"></i>首帧下行（首响）
    <i style="background:#6e7681"></i>朴素串行总和
  </div>
  <div id="turns"><div id="empty">等待第一轮对话…（先在 <a href="/">演示页</a> 说一句话）</div></div>
  <script src="dash.js"></script>
</body>
</html>
